name: Build and Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Check publish conditions
        id: publish_check
        shell: bash
        run: |
          package_name=$(node -p "require('./package.json').name")
          current_version=$(node -p "require('./package.json').version")
          previous_sha="${{ github.event.before }}"
          zero_sha="0000000000000000000000000000000000000000"
          previous_version=""

          if [ "$previous_sha" != "$zero_sha" ] && git cat-file -e "${previous_sha}^{commit}" 2>/dev/null; then
            previous_version=$(
              git show "${previous_sha}:package.json" 2>/dev/null | node -e "let input=''; process.stdin.on('data', (chunk) => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input).version || ''))" || true
            )
          fi

          should_publish=true
          reason="package version changed"

          if [ -n "$previous_version" ] && [ "$previous_version" = "$current_version" ]; then
            should_publish=false
            reason="package.json version unchanged"
          fi

          if npm view "${package_name}@${current_version}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            should_publish=false
            reason="version already published"
          fi

          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

          printf 'package=%s version=%s previous=%s should_publish=%s reason=%s\n' \
            "$package_name" \
            "$current_version" \
            "${previous_version:-<none>}" \
            "$should_publish" \
            "$reason"

      - name: Publish package
        if: steps.publish_check.outputs.should_publish == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish
        if: steps.publish_check.outputs.should_publish != 'true'
        run: 'echo "Skipping npm publish: ${{ steps.publish_check.outputs.reason }}"'
